  # plan_region: "tokyo_land"
  # plan_include_global: false
  seasonal_windows:
    - name: "northern_growing_season"
      hemisphere: "north"
      start_month: 4
      start_day: 1
      end_month: 10
      end_day: 31
    - name: "southern_growing_season"
      hemisphere: "south"
      start_month: 10
      start_day: 1
      end_month: 4
      end_day: 30
ocean:
  enabled: true
  source_id: "etopo_2022_15arcsec_geotiff"
  depth_color_ramp: "planetarble:ocean/depth_ramp.json"
  apply_hillshade: true
  hillshade_azimuth: 315.0
  hillshade_altitude: 45.0
  hillshade_strength: 0.45
  tone_mapping: "lambertian"
  viirs_blend_percent: 0.0
  viirs_max_fraction: 0.05
modis:
  enabled: false
  tiles: []
viirs:
  enabled: false
  tiles: []
copernicus:
  enabled: false
  bbox: [139.760, 35.700, 139.805, 35.735]
  min_zoom: 12
  max_zoom: 14
  layers:
    - name: "TRUE_COLOR"
sentinel2:
  enabled: true
  bbox: [139.760, 35.700, 139.805, 35.735]
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  max_cloud: 10.0
  assets:
    - "B02"
    - "B03"
    - "B04"
  max_items: 1
gsi_orthophotos:
  enabled: false
