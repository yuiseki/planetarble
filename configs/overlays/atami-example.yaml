# Example of a tightly-scoped AOI build (ADR 0001).
# Goal: a global planet that is sharp only where it matters, fetching nothing
# more than needed. For a clear AOI you do NOT think in miniplanet shards
# (those are the global-coverage strategy); you name the AOI directly.
#
#   base : BMNG, global floor
#   hls  : context imagery, derived from the SAME target bbox + a buffer.
#          HLS is the heaviest source to fetch, so do NOT pull a whole
#          prefecture (Atami is the far-eastern tip of Shizuoka; selecting
#          Shizuoka would waste most of it). A buffered target bbox fetches
#          only the tiles that actually surround the area of interest.
#   OAM  : high-resolution RGB orthophoto over the city of Atami only.
#          OAM max zoom is per-item (e.g. HOTOSM item 60e5afbe5bc2dc00058bbe06
#          reaches ~z20); the adapter reads the real ceiling from the item.
#
# Step 1 status: parsed and validated by planetarble.overlay; the orchestrator
# that executes it is a later step.
base:
  source: bmng
  resolution: "500m"
  max_zoom: 8

ocean:
  enabled: true

overlays:
  - name: atami_context_hls
    source: hls
    aoi:
      bbox: [139.02, 35.07, 139.12, 35.13]   # same target as OAM
      buffer_km: 20                            # auto-expanded footprint, no admin boundary
      land_only: true
    max_zoom: 11

  - name: atami_oam
    source: openaerialmap
    aoi:
      bbox: [139.02, 35.07, 139.12, 35.13]
    source_options:
      asset: rgb
    min_zoom: 8
    max_zoom: 18

output:
  name: planet_atami
