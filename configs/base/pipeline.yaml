        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Niigata'"
      land_only: true
    - name: "toyama_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Toyama'"
      land_only: true
    - name: "ishikawa_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Ishikawa'"
      land_only: true
    - name: "fukui_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Fukui'"
      land_only: true
    - name: "yamanashi_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Yamanashi'"
      land_only: true
    - name: "nagano_land"
      natural_earth:
