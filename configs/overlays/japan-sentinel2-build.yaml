# Japan, Sentinel-2 L2A (10m) "visual" (TCI) city overlays up to z14, on a
# global BMNG floor. Land only (ocean disabled). Each AOI is a city core
# centred on a station / venue, geocoded via nominatim.yuiseki.net:
#   - Tokyo: expanded to nearly the full T54SUE MGRS tile footprint
#     ([138.7776, 35.1350, 140.0097, 36.1407]) so it reuses the 25 already-cached
#     T54SUE TCIs with no new downloads (east is capped at ~140.01E; Chiba/T54SVE
#     is not cached). Covers Tokyo metro + Tama, Yokohama/Kawasaki, S. Saitama.
#   - Sendai (Sendai Station 38.2599, 140.8820)
#   - Hiroshima (Intl Conference Center / Peace Park 34.3921, 132.4510 + Hiroshima Station)
#   - Morioka (Morioka Station 39.7020, 141.1357)
#
# Used to grow coverage gradually and to measure Sentinel-2 rate-limit / disk
# trends per added AOI.
#
#   planetarble build \
#     --spec configs/overlays/japan-sentinel2-build.yaml \
#     --base-mbtiles <global BMNG floor mbtiles>
base:
  source: bmng
  resolution: "500m"
  max_zoom: 7
ocean:
  enabled: false
overlays:
  - name: tokyo_s2
    source: sentinel2
    aoi:
      # expanded to ~the full cached T54SUE tile (inset from the footprint edges
      # to avoid the UTM-rotated nodata corners); no new downloads
      bbox: [138.80, 35.16, 140.00, 36.13]
      land_only: true
    source_options: &s2_opts
      assets: ["visual"]
      max_cloud: 10
      start_date: "2023-04-01"
      end_date: "2024-10-31"
      mosaic_max_scenes: 3
    min_zoom: 8
    max_zoom: 14
  - name: chiba_s2
    source: sentinel2
    aoi:
      # ~the full T54SVE tile (east of Tokyo's T54SUE; the two overlap around
      # Tokyo Bay ~140.0E and composite, chiba last). T54SVE is NOT cached, so
      # this overlay triggers fresh MPC downloads (~3 TCIs). West Chiba (Chiba
      # city / Funabashi / Ichikawa) through Narita to the northern Boso.
      bbox: [139.95, 35.16, 141.05, 36.13]
      land_only: true
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: izu_s2
    source: sentinel2
    aoi:
      # T54SUD tile (south of Tokyo's T54SUE; overlaps it ~35.1-35.2N), inset
      # INSIDE the granule footprint [138.802, 34.234, 140.02, 35.239] so a
      # single granule fully covers it (S2 requires single-granule coverage; the
      # far-west Izu coast past ~138.8E falls outside this tile). Izu Peninsula
      # incl. Shimoda + Atami/Hakone/Odawara. T54SUD NOT cached -> ~3 fresh TCIs.
      bbox: [138.83, 34.25, 140.00, 35.22]
      land_only: true
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: numazu_s2
    source: sentinel2
    aoi:
      # T54STD tile, one block west of Izu (T54SUD); inset inside the granule
      # footprint [137.705, 34.210, 138.935, 35.225]. Fills the cut-off west Izu
      # coast (Matsuzaki/Toi) and adds Numazu/Mishima, Fuji, eastern Shizuoka.
      bbox: [137.73, 34.23, 138.92, 35.21]
      land_only: true
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: shizuoka_s2
    source: sentinel2
    aoi:
      # T53SQU tile, second block west; inset inside the granule footprint
      # [137.171, 34.214, 138.361, 35.223]. Shizuoka city west / Yaizu / Shimada.
      bbox: [137.20, 34.23, 138.34, 35.21]
      land_only: true
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: fuji_s2
    source: sentinel2
    aoi:
      # T54STE tile (north of numazu's T54STD): the WHOLE Mt Fuji - summit
      # (35.36N, above T54STD's 35.22 edge), north base / Fuji Five Lakes
      # (Kawaguchiko) and south/west flanks. East flank (Gotemba) is covered by
      # tokyo_s2's T54SUE. Inset inside the granule footprint
      # [137.685, 35.110, 138.912, 36.126]. T54STE uncached -> ~3 fresh TCIs.
      bbox: [138.50, 35.18, 138.90, 35.55]
      land_only: true
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: sendai_s2
    source: sentinel2
    aoi:
      # ~full cached T54SVH tile (3 cached scenes) -> reuses cache.
      # Sendai + Natori / Shiogama / Matsushima coast, inland to the hills.
      bbox: [139.86, 37.87, 141.10, 38.84]
      land_only: true
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: hiroshima_s2
    source: sentinel2
    aoi:
      # ~full cached T53SKU tile (3 cached scenes) -> no new downloads.
      # Hiroshima city / Kure / Higashi-Hiroshima / Hatsukaichi.
      bbox: [131.72, 34.22, 132.92, 35.22]
      land_only: true
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: morioka_s2
    source: sentinel2
    aoi:
      # ~full cached T54SWJ tile. Only 2 T54SWJ scenes are cached and the
      # Morioka/T54TWK boundary splits coverage, so use mosaic_max_scenes=2 to
      # stay download-free. Morioka sits at the north edge; expansion is mostly
      # south (Hanamaki/Kitakami) and east (Tono).
      bbox: [141.02, 38.77, 142.26, 39.74]
      land_only: true
    source_options:
      assets: ["visual"]
      max_cloud: 10
      start_date: "2023-04-01"
      end_date: "2024-10-31"
      mosaic_max_scenes: 2
    min_zoom: 8
    max_zoom: 14
  # --- priority population centres (prefetched; same city-core bboxes so the
  # --- cached scenes are reused and the build stays download-free) ---
  - name: osaka_s2          # T53SNU
    source: sentinel2
    aoi: { bbox: [135.316, 34.523, 135.676, 34.883], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: kyoto_s2          # T53SNU
    source: sentinel2
    aoi: { bbox: [135.580, 34.805, 135.940, 35.165], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: kobe_s2           # T53SNU
    source: sentinel2
    aoi: { bbox: [135.015, 34.514, 135.375, 34.874], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: nagoya_s2         # T53SPV
    source: sentinel2
    aoi: { bbox: [136.720, 35.160, 137.060, 35.450], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: kanazawa_s2       # T53SPA
    source: sentinel2
    aoi: { bbox: [136.469, 36.398, 136.829, 36.758], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: niigata_s2        # T54SUG
    source: sentinel2
    aoi: { bbox: [138.880, 37.860, 139.240, 38.200], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: okayama_s2        # T53SLU
    source: sentinel2
    aoi: { bbox: [133.750, 34.500, 134.000, 34.850], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: fukuoka_s2        # T52SFC
    source: sentinel2
    aoi: { bbox: [130.240, 33.410, 130.600, 33.770], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: kumamoto_s2       # T52SFB
    source: sentinel2
    aoi: { bbox: [130.675, 32.656, 131.035, 33.016], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
  - name: nagasaki_s2       # T52SEB
    source: sentinel2
    aoi: { bbox: [129.689, 32.572, 130.049, 32.932], land_only: true }
    source_options: *s2_opts
    min_zoom: 8
    max_zoom: 14
output:
  name: planet_japan_sentinel-2
