# Default pipeline locations for Planetarble (HLS-first configuration)
data_dir: data
temp_dir: tmp
output_dir: output
processing:
  bmng_resolution: "500m"
  gebco_year: 2024
  natural_earth_scale: "10m"
  color_enhancement: 1.0
  hillshade_opacity: 0.12
  min_zoom: 0
  max_zoom: 13
  resampling: "lanczos"
  tile_format: "WEBP"
  tile_quality: 82
  tile_name: "Planetarble HLS Mosaic"
  tile_attribution: ""
  gdal_num_threads: "ALL_CPUS"
  gdal_cachemax: "50%"
  pmtiles_dedup: true
  mbtiles_tiler: "auto"
  zoom_level_strategy: "UPPER"
  tile_source: sentinel2
hls:
  enabled: true
  stac_api: "https://planetarycomputer.microsoft.com/api/stac/v1"
  collections:
    - "hls2-s30"
    - "hls2-l30"
  fallback_collections:
    - "landsat-c2-l2"
  land_mask_path: null
  land_buffer_km: 20.0
  max_cloud: 80.0
  fallback_max_cloud: 90.0
  max_scene_age_days: 3650
  qa_mask_flags:
    - "cloud"
    - "cloud_shadow"
    - "snow"
  mosaic_strategy: "best_pixel"
  robust_median_window: 5
  target_zoom: 10
  tile_size: 256
  concurrency: 6
  request_timeout_seconds: 90
  max_retries: 6
  backoff_factor: 2.0
  compositing_year: 2024
  spectral_bands:
    - "B02"
    - "B03"
    - "B04"
  qa_asset_key: "Fmask"
  # Optional regional plan filters to make HLS acquisition incremental.
  plan_regions:
    - name: "tokyo_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Tokyo'"
      land_only: true
    - name: "kanagawa_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Kanagawa'"
      land_only: true
    - name: "chiba_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Chiba'"
      land_only: true
    - name: "saitama_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Saitama'"
      land_only: true
    - name: "ibaraki_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Ibaraki'"
      land_only: true
    - name: "tochigi_land"
      natural_earth:
        dataset: "admin_1"
        where: "adm0_a3='JPN' AND name='Tochigi'"
      land_only: true
    - name: "gunma_land"
